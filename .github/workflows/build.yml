name: build ladybird

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      no_cache:
        type: boolean
        default: false
        description: disable cache
      clean_build:
        type: boolean
        default: false
        description: clean build directory before building

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LADYBIRD_SOURCE_DIR: ${{ github.workspace }}/ladybird
  CCACHE_DIR: ${{ github.workspace }}/.ccache
  VCPKG_ROOT: ${{ github.workspace }}/ladybird/Build/vcpkg
  XDG_CACHE_HOME: ${{ github.workspace }}/ladybird/Build/caches
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/ladybird/Build/caches/vcpkg-binary-cache
  CCACHE_COMPILERCHECK: "%compiler% -v"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ladybirdbrowser/ladybird-ci:2026.05.4

    steps:
    - name: checkout repository
      uses: actions/checkout@v6.0.2
      with:
        submodules: false
        fetch-depth: 1

    - name: get current date
      id: date
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "build_id=$(date +'%Y-%m-%d-%H%M')-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT
        echo "cache_stamp=$(date -u +'%Y%m%d%H%M_%S')" >> $GITHUB_OUTPUT

    - name: setup cache directories
      run: |
        mkdir -p ${{ env.CCACHE_DIR }}
        mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}

    - name: install missing runtime dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          libxcb-xinput-dev \
          qt6-wayland-dev

    - name: setup ladybird source
      run: python3 ladybird.py setup

    - name: restore ccache
      id: ccache-restore
      if: ${{ !inputs.no_cache }}
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ccache | Linux | x86_64 | Clang | Release | ${{ steps.date.outputs.cache_stamp }}
        restore-keys: |
          ccache | Linux | x86_64 | Clang | Release

    - name: restore vcpkg cache
      id: vcpkg-restore
      if: ${{ !inputs.no_cache }}
      uses: actions/cache/restore@v4
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: vcpkg | Linux | x86_64 | Clang | Release | ${{ hashFiles('ladybird/vcpkg.json') }}
        restore-keys: |
          vcpkg | Linux | x86_64 | Clang | Release

    - name: configure ccache
      run: |
        ccache -M 0
        ccache --set-config=compression=true
        ccache --set-config=compression_level=6
        ccache --set-config=base_dir=${{ github.workspace }}
        ccache --set-config=hash_dir=false
        find "${{ env.CCACHE_DIR }}" -mindepth 1 -print0 | xargs -0r touch -a -m -d "2018-10-10T09:53:07Z"
        ccache -s
        ccache -z

    - name: build ladybird
      env:
        LADYBIRD_CMAKE_ARGS: --preset Release -DBUILD_TESTING=OFF -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++
      run: |
        BUILD_FLAGS=""
        if [ "${{ inputs.clean_build }}" = "true" ]; then
          BUILD_FLAGS="--clean"
        fi
        python3 ladybird.py build $BUILD_FLAGS

    - name: package ladybird (appimage)
      run: python3 ladybird.py package --type appimage --name Ladybird-${{ steps.date.outputs.build_id }}

    - name: package ladybird (tarball)
      run: python3 ladybird.py package --type tarball --name Ladybird-${{ steps.date.outputs.build_id }}

    - name: show ccache stats
      if: always()
      run: ccache -s

    - name: save ccache
      if: ${{ !inputs.no_cache && always() }}
      run: ccache --evict-older-than=1d

    - name: persist ccache
      if: ${{ !inputs.no_cache && always() }}
      uses: actions/cache/save@v4
      with:
        path: ${{ env.CCACHE_DIR }}
        key: ${{ steps.ccache-restore.outputs.cache-primary-key }}

    - name: persist vcpkg cache
      if: ${{ !inputs.no_cache && always() }}
      uses: actions/cache/save@v4
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ steps.vcpkg-restore.outputs.cache-primary-key }}

    - name: upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ladybird-linux-x64-${{ steps.date.outputs.build_id }}
        path: output/*
        retention-days: 30

    - name: create release
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: nightly-${{ steps.date.outputs.date }}
        name: Nightly Build ${{ steps.date.outputs.date }}
        body: |
          ladybird ${{ steps.date.outputs.date }} build
        files: output/*
        overwrite_files: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
