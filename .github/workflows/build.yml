name: build ladybird

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      no_cache:
        type: boolean
        default: false
        description: disable cache
      clean_build:
        type: boolean
        default: false
        description: clean build directory before building

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LADYBIRD_SOURCE_DIR: ${{ github.workspace }}/ladybird
  SCCACHE_GHA_ENABLED: "true"
  VCPKG_ROOT: ${{ github.workspace }}/ladybird/Build/vcpkg
  XDG_CACHE_HOME: ${{ github.workspace }}/ladybird/Build/caches
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/ladybird/Build/caches/vcpkg-binary-cache
  CCACHE_COMPILERCHECK: "%compiler% -v"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ladybirdbrowser/ladybird-ci:2026.05.4

    steps:
    - name: checkout repository
      uses: actions/checkout@v6.0.2
      with:
        submodules: false
        fetch-depth: 1

    - name: install sccache
      run: |
        SCCACHE_VERSION=v0.16.0

        curl -L https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz | tar xz

        install -Dm755 sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache /usr/local/bin/sccache
        sccache --version

    - name: get current date
      id: date
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "build_id=$(date +'%Y-%m-%d-%H%M')-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT
        echo "cache_stamp=$(date -u +'%Y%m%d%H%M_%S')" >> $GITHUB_OUTPUT

    - name: setup cache directories
      run: |
        mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}

    - name: install missing runtime dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends libxcb-xinput-dev qt6-wayland-dev

    - name: setup ladybird source
      run: python3 ladybird.py setup

    - name: restore vcpkg cache
      id: vcpkg-restore
      if: ${{ !inputs.no_cache }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: vcpkg | Linux | x86_64 | Clang | Release | ${{ hashFiles('ladybird/vcpkg.json') }}
        restore-keys: |
          vcpkg | Linux | x86_64 | Clang | Release

    - name: build ladybird
      id: build
      run: |
        BUILD_FLAGS=""
        if [ "${{ inputs.clean_build }}" = "true" ]; then
          BUILD_FLAGS="--clean"
        fi
        python3 ladybird.py build $BUILD_FLAGS

    - name: package ladybird (appimage)
      run: python3 ladybird.py package --type appimage --name Ladybird-${{ steps.date.outputs.build_id }}

    - name: package ladybird (tarball)
      run: python3 ladybird.py package --type tarball --name Ladybird-${{ steps.date.outputs.build_id }}

    - name: show sccache stats
      if: always()
      run: sccache --show-stats

    - name: persist vcpkg cache
      if: ${{ !inputs.no_cache }}
      uses: actions/cache/save@v5
      with:
        path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        key: ${{ steps.vcpkg-restore.outputs.cache-primary-key }}

    - name: upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ladybird-linux-x64-${{ steps.date.outputs.build_id }}
        path: output/*
        retention-days: 30

    - name: create release
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: nightly-${{ steps.date.outputs.date }}
        name: Nightly Build ${{ steps.date.outputs.date }}
        body: |
          ladybird ${{ steps.date.outputs.date }} build
        files: output/*
        overwrite_files: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
