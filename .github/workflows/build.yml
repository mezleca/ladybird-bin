name: build ladybird

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      no_cache:
        type: boolean
        default: false
        description: disable cache
      clean_build:
        type: boolean
        default: false
        description: clean build directory before building

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  LADYBIRD_SOURCE_DIR: ${{ github.workspace }}/ladybird
  SCCACHE_GHA_ENABLED: "true"
  VCPKG_ROOT: ${{ github.workspace }}/ladybird/Build/vcpkg
  XDG_CACHE_HOME: ${{ github.workspace }}/ladybird/Build/caches
  VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/ladybird/Build/caches/vcpkg-binary-cache,readwrite"
  VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/ladybird/Build/caches/vcpkg-binary-cache
  VCPKG_CACHE_ARCHIVE: ${{ github.workspace }}/vcpkg-cache.tar.gz
  CCACHE_COMPILERCHECK: "%compiler% -v"

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ladybirdbrowser/ladybird-ci:2026.05.4

    steps:
    - name: checkout repository
      uses: actions/checkout@v6.0.2
      with:
        submodules: false
        fetch-depth: 1

    - name: Run sccache-cache
      uses: mozilla-actions/sccache-action@v0.0.10

    - name: get current date
      id: date
      run: |
        echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "build_id=$(date +'%Y-%m-%d-%H%M')-${GITHUB_RUN_ID}" >> $GITHUB_OUTPUT
        echo "cache_stamp=$(date -u +'%Y%m%d%H%M_%S')" >> $GITHUB_OUTPUT

    - name: setup cache directories
      run: |
        mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}

    - name: install missing runtime dependencies
      run: |
        apt-get update
        apt-get install -y sudo libxcb-xinput-dev libxcb-cursor0 libxcb-xinerama0 libxcb-cursor-dev

    - name: install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.9.*'
        setup-python: false

    - name: setup ladybird source
      run: python3 ladybird.py setup

    # restore a single tar.gz instead of letting actions/cache glob the vcpkg
    # cache tree directly, globbing that tree inside this container job was
    # producing near empty archives on save, so we archive it ourselves
    - name: restore vcpkg cache archive
      id: vcpkg-restore
      if: ${{ !inputs.no_cache }}
      uses: actions/cache/restore@v5
      with:
        path: ${{ env.VCPKG_CACHE_ARCHIVE }}
        key: vcpkg-${{ hashFiles('ladybird/vcpkg.json') }}-${{ steps.date.outputs.cache_stamp }}
        restore-keys: |
          vcpkg-${{ hashFiles('ladybird/vcpkg.json') }}-
          vcpkg-

    - name: extract vcpkg cache archive
      if: ${{ !inputs.no_cache && steps.vcpkg-restore.outputs.cache-hit != '' }}
      run: |
        if [ -f "${{ env.VCPKG_CACHE_ARCHIVE }}" ]; then
          mkdir -p ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          tar -xzf ${{ env.VCPKG_CACHE_ARCHIVE }} -C ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
        fi

    - name: vcpkg cache debug (before)
      run: |
        du -sh ${{ env.VCPKG_DEFAULT_BINARY_CACHE }} 2>/dev/null || echo "empty"
        find ${{ env.VCPKG_DEFAULT_BINARY_CACHE }} -type f | wc -l

    - name: build ladybird
      id: build
      run: |
        BUILD_FLAGS=""
        if [ "${{ inputs.clean_build }}" = "true" ]; then
          BUILD_FLAGS="--clean"
        fi
        python3 ladybird.py build $BUILD_FLAGS

    - name: package ladybird (appimage)
      run: python3 ladybird.py package --type appimage --name Ladybird-${{ steps.date.outputs.build_id }}

    - name: package ladybird (tarball)
      run: python3 ladybird.py package --type tarball --name Ladybird-${{ steps.date.outputs.build_id }}

    - name: vcpkg cache debug (before 2)
      if: always()
      run: |
        du -sh ${{ env.VCPKG_DEFAULT_BINARY_CACHE }} 2>/dev/null || echo "empty"
        find ${{ env.VCPKG_DEFAULT_BINARY_CACHE }} -type f | wc -l

    - name: tar vcpkg cache
      if: ${{ !inputs.no_cache && always() }}
      run: |
        rm -f ${{ env.VCPKG_CACHE_ARCHIVE }}
        tar -C ${{ env.VCPKG_DEFAULT_BINARY_CACHE }} -czf ${{ env.VCPKG_CACHE_ARCHIVE }} .
        ls -lh ${{ env.VCPKG_CACHE_ARCHIVE }}

    - name: persist vcpkg cache
      if: ${{ !inputs.no_cache && always() }}
      uses: actions/cache/save@v6
      with:
        path: ${{ env.VCPKG_CACHE_ARCHIVE }}
        key: vcpkg-${{ hashFiles('ladybird/vcpkg.json') }}-${{ steps.date.outputs.cache_stamp }}

    - name: show sccache stats
      if: always()
      run: sccache --show-stats

    - name: upload artifact
      uses: actions/upload-artifact@v6
      with:
        name: ladybird-linux-x64-${{ steps.date.outputs.build_id }}
        path: output/*
        retention-days: 30

    - name: create release
      if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
      uses: softprops/action-gh-release@v3
      with:
        tag_name: nightly-${{ steps.date.outputs.date }}
        name: Nightly Build ${{ steps.date.outputs.date }}
        body: |
          ladybird ${{ steps.date.outputs.date }} build
        files: output/*
        overwrite_files: false
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
